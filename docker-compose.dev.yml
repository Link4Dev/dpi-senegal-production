version: "3.9"

services:
  odoo:
    image: odoo:16.0
    ports:
      - "8069:8069"
    volumes:
      - ../../odoo/addons:/mnt/addons
    command: >
      odoo
      --addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/addons
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: dpi
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
